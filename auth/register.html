<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circl · Crear cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: var(--color-white);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-pill);
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--color-dark);
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow 0.18s ease, border-color 0.18s ease;
      margin-top: 4px;
    }
    .btn-google:hover {
      border-color: rgba(10,126,140,0.3);
      box-shadow: 0 2px 12px rgba(10,126,140,0.1);
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 4px;
      color: var(--color-muted);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
  </style>
</head>
<body>

<div class="auth-page">
  <!-- Decorative circles -->
  <div class="auth-deco auth-deco-1"></div>
  <div class="auth-deco auth-deco-2"></div>
  <!-- Extra outline circle for motif -->
  <div style="position:absolute;width:380px;height:380px;border:1.5px solid rgba(10,126,140,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
  <div style="position:absolute;width:560px;height:560px;border:1px solid rgba(10,126,140,0.05);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo-wrap">
      <img src="../assets/img/LOGO_CIRCL_1.svg" alt="Circl">
      <span class="auth-logo-word">Circl</span>
    </div>

    <h1 class="auth-heading">Creá tu cuenta</h1>
    <p class="auth-sub">Activá tu círculo de apoyo en minutos.</p>

    <!-- Google OAuth button -->
    <a href="onboarding.html" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.08-6.08C34.42 3.09 29.5 1 24 1 14.82 1 7.03 6.48 3.52 14.22l7.1 5.52C12.3 13.77 17.69 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.69c-.55 2.96-2.22 5.47-4.72 7.16l7.18 5.57C43.27 37.56 46.52 31.5 46.52 24.5z"/>
        <path fill="#FBBC05" d="M10.62 28.26A14.52 14.52 0 0 1 9.5 24c0-1.48.25-2.91.62-4.26l-7.1-5.52A23.93 23.93 0 0 0 0 24c0 3.88.93 7.54 2.52 10.78l8.1-6.52z"/>
        <path fill="#34A853" d="M24 47c6.48 0 11.93-2.14 15.9-5.82l-7.18-5.57C30.6 37.28 27.46 38.5 24 38.5c-6.31 0-11.7-4.27-13.38-10.24l-8.1 6.52C6.03 42.52 14.46 47 24 47z"/>
      </svg>
      Continuar con Google
    </a>

    <!-- Divider -->
    <div class="auth-divider">
      <span>o registrate con email</span>
    </div>

    <form class="auth-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="nombre">Nombre completo</label>
        <input class="form-input" id="nombre" type="text" placeholder="Valeria López" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" placeholder="valeria@mail.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <a href="verify-email.html" class="btn btn-primary btn-block" style="margin-top:8px;text-align:center;">
        Crear mi cuenta
      </a>
    </form>

    <div class="auth-footer">
      ¿Ya tenés cuenta? <a class="link-teal" href="login.html">Ingresá</a>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>window.CASE_NAV_PAGE_ID = 'register';</script>
<script src="../assets/js/case-nav.js"></script>
</body>
</html>
