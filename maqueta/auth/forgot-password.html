<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circl · Recuperar contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-deco auth-deco-1"></div>
  <div class="auth-deco auth-deco-2"></div>
  <div style="position:absolute;width:380px;height:380px;border:1.5px solid rgba(10,126,140,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
  <div style="position:absolute;width:560px;height:560px;border:1px solid rgba(10,126,140,0.05);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>

  <div class="auth-card">
    <div class="auth-logo-wrap">
      <img src="../assets/img/LOGO_CIRCL_1.svg" alt="Circl">
      <span class="auth-logo-word">Circl</span>
    </div>

    <h1 class="auth-heading">Recuperá tu acceso</h1>
    <p class="auth-sub">Ingresá tu email y te envío las instrucciones para restablecer tu contraseña.</p>

    <form class="auth-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" placeholder="valeria@mail.com" autocomplete="email">
      </div>
      <button class="btn btn-primary btn-block" type="submit" style="margin-top:8px;">
        Enviar instrucciones
      </button>
    </form>

    <div class="auth-footer">
      <a class="link-teal" href="login.html">← Volver</a>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>window.CASE_NAV_PAGE_ID = 'forgot-password';</script>
<script src="../assets/js/case-nav.js"></script>
</body>
</html>
