<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circl · Nueva contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    /* Password input wrapper for toggle */
    .input-wrap {
      position: relative;
    }
    .input-wrap .form-input {
      padding-right: 46px;
    }
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--color-muted);
      display: flex;
      align-items: center;
      transition: color 0.18s;
    }
    .pw-toggle:hover { color: var(--color-teal); }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-deco auth-deco-1"></div>
  <div class="auth-deco auth-deco-2"></div>
  <div style="position:absolute;width:380px;height:380px;border:1.5px solid rgba(10,126,140,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
  <div style="position:absolute;width:560px;height:560px;border:1px solid rgba(10,126,140,0.05);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo-wrap">
      <img src="../assets/img/LOGO_CIRCL_1.svg" alt="Circl">
      <span class="auth-logo-word">Circl</span>
    </div>

    <h1 class="auth-heading">Nueva contraseña</h1>
    <p class="auth-sub">Elegí una contraseña para proteger tu cuenta.</p>

    <form class="auth-form" id="resetForm" onsubmit="handleSubmit(event);">

      <!-- Nueva contraseña -->
      <div class="form-group">
        <label class="form-label" for="password">Nueva contraseña</label>
        <div class="input-wrap">
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="Tu nueva contraseña"
            autocomplete="new-password"
          >
          <button type="button" class="pw-toggle" onclick="toggleVisibility('password', this)" aria-label="Mostrar contraseña">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p id="pw-error" style="color:#ba1a1a;font-size:0.72rem;font-weight:600;margin-top:6px;display:none;"></p>
      </div>

      <!-- Confirmar contraseña -->
      <div class="form-group">
        <label class="form-label" for="confirm">Repetí la contraseña</label>
        <div class="input-wrap">
          <input
            class="form-input"
            id="confirm"
            type="password"
            placeholder="Repetí tu contraseña"
            autocomplete="new-password"
          >
          <button type="button" class="pw-toggle" onclick="toggleVisibility('confirm', this)" aria-label="Mostrar contraseña">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p id="confirm-error" style="color:#ba1a1a;font-size:0.72rem;font-weight:600;margin-top:6px;display:none;"></p>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary btn-block" type="submit" style="margin-top:8px;">
        Guardar contraseña
      </button>
    </form>

    <div class="auth-footer">
      <a class="link-teal" href="login.html">← Volver al login</a>
    </div>
  </div>
</div>

<script>
  /* ── Toggle visibility ──────────────────────────────────────── */
  function toggleVisibility(inputId, btn) {
    const input = document.getElementById(inputId)
    const isText = input.type === 'text'
    input.type = isText ? 'password' : 'text'
    btn.innerHTML = isText
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
  }

  /* ── Error helper ───────────────────────────────────────────── */
  function showError(id, msg) {
    const el = document.getElementById(id)
    el.textContent = msg
    el.style.display = msg ? 'block' : 'none'
  }

  function setBorderError(inputId, hasError) {
    const input = document.getElementById(inputId)
    input.style.borderColor = hasError ? '#ba1a1a' : ''
    input.style.background  = hasError ? 'rgba(186,26,26,0.03)' : ''
  }

  /* ── Submit ─────────────────────────────────────────────────── */
  function handleSubmit(e) {
    e.preventDefault()
    const pw      = document.getElementById('password').value
    const confirm = document.getElementById('confirm').value
    let valid = true

    if (!pw) {
      showError('pw-error', 'Ingresá tu nueva contraseña')
      setBorderError('password', true)
      valid = false
    } else {
      showError('pw-error', '')
      setBorderError('password', false)
    }

    if (!confirm) {
      showError('confirm-error', 'Repetí tu contraseña')
      setBorderError('confirm', true)
      valid = false
    } else if (confirm !== pw) {
      showError('confirm-error', 'Las contraseñas no coinciden')
      setBorderError('confirm', true)
      valid = false
    } else {
      showError('confirm-error', '')
      setBorderError('confirm', false)
    }

    if (!valid) return

    window.location.href = 'reset-password-success.html'
  }
</script>

<script src="../assets/js/main.js"></script>
<script>window.CASE_NAV_PAGE_ID = 'reset-password';</script>
<script src="../assets/js/case-nav.js"></script>
</body>
</html>
