<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circl · Verificación — Email ya verificado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <style>
    .info-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(10,126,140,0.08);
      border: 2px solid rgba(10,126,140,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--color-teal);
    }
    .info-block {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(10,126,140,0.05);
      border: 1px solid rgba(10,126,140,0.15);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .info-block .material-symbols-outlined {
      color: var(--color-teal);
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .info-block p {
      font-size: var(--text-sm);
      color: var(--color-teal);
      font-weight: 600;
      margin: 0 0 4px;
    }
    .info-block span {
      font-size: var(--text-xs);
      color: var(--color-muted);
      font-weight: 400;
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-deco auth-deco-1"></div>
  <div class="auth-deco auth-deco-2"></div>
  <div style="position:absolute;width:380px;height:380px;border:1.5px solid rgba(10,126,140,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
  <div style="position:absolute;width:560px;height:560px;border:1px solid rgba(10,126,140,0.05);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>

  <div class="auth-card" style="text-align:center;">
    <div class="auth-logo-wrap" style="justify-content:center;">
      <img src="../../assets/img/LOGO_CIRCL_1.svg" alt="Circl">
      <span class="auth-logo-word">Circl</span>
    </div>

    <div class="info-icon">
      <span class="material-symbols-outlined" style="font-size:34px;">mark_email_read</span>
    </div>

    <h1 class="auth-heading" style="font-size:var(--text-xl);">Este link ya fue usado</h1>

    <div class="info-block">
      <span class="material-symbols-outlined">info</span>
      <div>
        <p>Tu email ya está verificado</p>
        <span>Este link de verificación ya fue utilizado anteriormente. Tu cuenta está activa. Podés ingresar normalmente.</span>
      </div>
    </div>

    <a href="../login.html" class="btn btn-primary btn-block" style="margin-bottom:12px;text-align:center;">
      Ingresar a mi cuenta
    </a>

    <div class="auth-footer">
      ¿Necesitás ayuda? <a class="link-teal" href="mailto:soporte@circl.app">Contactanos</a>
    </div>
  </div>
</div>
<script src="../../assets/js/main.js"></script>
<script>window.CASE_NAV_PAGE_ID = 'verify-email';</script>
<script src="../../assets/js/case-nav.js"></script>
</body>
</html>
