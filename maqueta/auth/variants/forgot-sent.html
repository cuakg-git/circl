<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mhiru · Recuperar — Email enviado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <style>
    .confirm-icon { width:72px; height:72px; border-radius:50%; background:rgba(61,199,166,0.12); border:2px solid rgba(61,199,166,0.3); display:flex;align-items:center;justify-content:center; margin:0 auto 20px; color:var(--color-teal); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-deco auth-deco-1"></div>
  <div class="auth-deco auth-deco-2"></div>
  <div style="position:absolute;width:380px;height:380px;border:1.5px solid rgba(10,126,140,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>

  <div class="auth-card" style="text-align:center;">
    <div class="auth-logo-wrap" style="justify-content:center;">
      <img src="../../assets/img/LOGO_CIRCL_1.svg" alt="Mhiru">
      <span class="auth-logo-word">Mhiru</span>
    </div>

    <div class="confirm-icon">
      <span class="material-symbols-outlined" style="font-size:34px;">mark_email_read</span>
    </div>

    <h1 class="auth-heading" style="font-size:var(--text-xl);">Revisá tu email</h1>
    <p class="auth-sub" style="margin-bottom:24px;">
      Te envié las instrucciones para restablecer tu contraseña a <strong>valeria@mail.com</strong>. Si no lo ves, revisá la carpeta de spam.
    </p>

    <p style="font-size:var(--text-xs);color:var(--color-muted);margin-bottom:20px;">¿No llegó? Puede demorar hasta 5 minutos.</p>

    <button class="btn btn-primary btn-block" style="margin-bottom:12px;">Reenviar email</button>

    <div class="auth-footer">
      <a class="link-teal" href="../login.html" style="display:inline-flex;align-items:center;gap:6px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>Volver al login</a>
    </div>
  </div>
</div>
<script src="../../assets/js/main.js"></script>
<script>window.CASE_NAV_PAGE_ID = 'forgot';</script>
<script src="../../assets/js/case-nav.js"></script>
</body>
</html>
