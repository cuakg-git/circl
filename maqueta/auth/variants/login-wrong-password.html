<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circl · Login — Contraseña incorrecta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <style>
    .field-error { color: #ba1a1a; font-size: 12px; margin-top: 4px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .input-error { border-color: #ba1a1a !important; background: rgba(186,26,26,0.03) !important; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-deco auth-deco-1"></div>
  <div class="auth-deco auth-deco-2"></div>
  <div style="position:absolute;width:380px;height:380px;border:1.5px solid rgba(10,126,140,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
  <div style="position:absolute;width:560px;height:560px;border:1px solid rgba(10,126,140,0.05);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>

  <div class="auth-card">
    <div class="auth-logo-wrap">
      <img src="../../assets/img/LOGO_CIRCL_1.svg" alt="Circl">
      <span class="auth-logo-word">Circl</span>
    </div>
    <h1 class="auth-heading">Bienvenida de nuevo</h1>
    <p class="auth-sub">Ingresá para ver tu círculo.</p>

    <a href="../../app/dashboard.html" class="btn btn-block" style="display:flex;align-items:center;justify-content:center;gap:10px;background:var(--color-white);border:1.5px solid var(--color-border);color:var(--color-dark);font-weight:600;text-decoration:none;">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/><path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332Z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58Z" fill="#EA4335"/></svg>
      Continuar con Google
    </a>

    <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
      <div style="flex:1;height:1px;background:var(--color-border);"></div>
      <span style="font-size:var(--text-xs);color:var(--color-muted);font-weight:600;letter-spacing:0.05em;">O ingresá con email</span>
      <div style="flex:1;height:1px;background:var(--color-border);"></div>
    </div>

    <form class="auth-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" value="valeria@mail.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input input-error" id="password" type="password" value="wrongpass" autocomplete="current-password">
        <div class="field-error">Contraseña incorrecta. <a class="link-teal" href="../forgot-password.html">¿Olvidaste tu contraseña?</a></div>
      </div>
      <a href="../../app/dashboard.html" class="btn btn-primary btn-block" style="margin-top:8px;text-align:center;">Ingresar</a>
    </form>

    <div class="auth-footer">¿No tenés cuenta? <a class="link-teal" href="../register.html">Registrate gratis</a></div>
  </div>
</div>
<script src="../../assets/js/main.js"></script>
<script>window.CASE_NAV_PAGE_ID = 'login';</script>
<script src="../../assets/js/case-nav.js"></script>
</body>
</html>
