<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circl · Contraseña actualizada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    /* Success icon with animated ring */
    .success-icon-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
    }
    .success-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(46,205,167,0.30);
      animation: ringPulse 2.4s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.12); opacity: 0.45; }
    }
    .success-icon {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: rgba(46,205,167,0.12);
      border: 2px solid rgba(46,205,167,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-teal);
    }

    /* Checkmark SVG draw animation */
    .check-path {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 0.55s ease-out 0.2s forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* Card fade-in */
    .auth-card {
      animation: cardIn 0.45s ease-out both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-deco auth-deco-1"></div>
  <div class="auth-deco auth-deco-2"></div>
  <div style="position:absolute;width:380px;height:380px;border:1.5px solid rgba(10,126,140,0.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
  <div style="position:absolute;width:560px;height:560px;border:1px solid rgba(10,126,140,0.05);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>

  <div class="auth-card" style="text-align:center;">
    <!-- Logo -->
    <div class="auth-logo-wrap" style="justify-content:center;">
      <img src="../assets/img/LOGO_CIRCL_1.svg" alt="Circl">
      <span class="auth-logo-word">Circl</span>
    </div>

    <!-- Animated success icon -->
    <div class="success-icon-wrap">
      <div class="success-ring"></div>
      <div class="success-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#0A7E8C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path class="check-path" d="M5 12l5 5L20 7"/>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="auth-heading" style="font-size:var(--text-xl);margin-bottom:8px;">
      ¡Contraseña actualizada!
    </h1>
    <p class="auth-sub" style="margin-bottom:24px;">
      Tu contraseña fue cambiada con éxito.<br>Ya podés ingresar con tus nuevos datos.
    </p>

    <!-- CTA principal -->
    <a href="login.html" class="btn btn-primary btn-block" style="margin-bottom:12px;">
      Continuar
    </a>

    <!-- Separator -->
    <p style="font-size:var(--text-xs);color:var(--color-muted);">
      ¿Necesitás ayuda? Escribinos a
      <a class="link-teal" href="mailto:soporte@circl.app">soporte@circl.app</a>
    </p>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>window.CASE_NAV_PAGE_ID = 'reset-password-success';</script>
<script src="../assets/js/case-nav.js"></script>
</body>
</html>
